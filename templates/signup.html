<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Student Management System - Sign Up">
    <title>Sign Up — Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0d1117;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .signup-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }
        .signup-card h2 {
            color: #e6edf3;
            font-weight: 600;
        }
        .form-control {
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #e6edf3;
        }
        .form-control:focus {
            background-color: #0d1117;
            border-color: #58a6ff;
            color: #e6edf3;
            box-shadow: 0 0 0 0.2rem rgba(88, 166, 255, 0.25);
        }
        .btn-primary {
            background-color: #238636;
            border-color: #238636;
        }
        .btn-primary:hover {
            background-color: #2ea043;
            border-color: #2ea043;
        }
        .brand-text {
            color: #58a6ff;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }
        a {
            color: #58a6ff;
        }
        a:hover {
            color: #79c0ff;
        }
    </style>
</head>
<body>
    <div class="signup-card">
        <div class="text-center mb-4">
            <div class="brand-text">Student Management System</div>
            <h2>Create Account</h2>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show py-2" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/signup">
            <div class="mb-3">
                <label for="username" class="form-label text-secondary">Username</label>
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="Choose a username" required autofocus>
            </div>
            <div class="mb-3">
                <label for="full_name" class="form-label text-secondary">Full Name</label>
                <input type="text" class="form-control" id="full_name" name="full_name"
                       placeholder="e.g. Rahul Roy" required>
            </div>
            <div class="mb-3">
                <label for="roll_number" class="form-label text-secondary">Roll Number</label>
                <input type="text" class="form-control" id="roll_number" name="roll_number"
                       placeholder="e.g. CS2024006" required>
            </div>
            <div class="mb-3">
                <label for="department" class="form-label text-secondary">Department</label>
                <select class="form-select" id="department" name="department" required
                        style="background-color: #0d1117; border: 1px solid #30363d; color: #e6edf3;">
                    <option value="">Select Department</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Mechanical">Mechanical</option>
                    <option value="Information Technology">Information Technology</option>
                    <option value="Civil">Civil</option>
                    <option value="Electrical">Electrical</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label text-secondary">Password</label>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Choose a password" required>
            </div>
            <div class="mb-3">
                <label for="confirm_password" class="form-label text-secondary">Confirm Password</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                       placeholder="Re-enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 mt-2">Sign Up</button>
        </form>

        <div class="text-center mt-4">
            <span class="text-secondary">Already have an account?</span>
            <a href="/login">Sign in</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
